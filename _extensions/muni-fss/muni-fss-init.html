<script>
(function () {
  'use strict';

  // Resolve base URL of this extension by finding its stylesheet in <head>
  function getExtBase() {
    var links = document.querySelectorAll('link[rel="stylesheet"]');
    for (var i = 0; i < links.length; i++) {
      if (links[i].href && links[i].href.indexOf('muni-fss') !== -1) {
        return links[i].href.replace(/[^/]*\.css[^/]*$/, '');
      }
    }
    return './_extensions/muni-fss/';
  }

  function buildTitleSlide(base) {
    var slide = document.getElementById('title-slide');
    if (!slide) return;

    // Collect existing Quarto-generated elements (Quarto 1.4+ class names)
    var title     = slide.querySelector('.title');
    var subtitle  = slide.querySelector('.subtitle');
    var authorEl  = slide.querySelector('.quarto-title-author-name');
    var affil     = slide.querySelector('.quarto-title-affiliation');
    var date      = slide.querySelector('.date');

    // Promote author/affiliation out of their wrappers before clearing
    var authorText  = authorEl  ? authorEl.textContent.trim()  : '';
    var affilText   = affil     ? affil.textContent.trim()      : '';

    // Clear slide and rebuild: logo top-left on white, content below
    slide.innerHTML = '';
    slide.classList.remove('center');

    var logo = document.createElement('img');
    logo.src = base + 'assets/logos/logo-fss-blue.png';
    logo.alt = 'MUNI FSS';
    logo.className = 'title-logo';
    slide.appendChild(logo);

    var body = document.createElement('div');
    body.className = 'title-body';

    if (title) body.appendChild(title);
    if (subtitle) body.appendChild(subtitle);

    var emailText = getMeta('muni-email') || '';

    if (authorText || emailText || affilText) {
      var meta = document.createElement('div');
      meta.className = 'title-meta';
      if (authorText) {
        var a = document.createElement('p');
        a.className = 'title-author';
        a.textContent = authorText;
        meta.appendChild(a);
      }
      if (emailText) {
        var e = document.createElement('p');
        e.className = 'title-email';
        e.textContent = emailText;
        meta.appendChild(e);
      }
      if (affilText) {
        var inst = document.createElement('p');
        inst.className = 'title-institute';
        inst.textContent = affilText;
        meta.appendChild(inst);
      }
      body.appendChild(meta);
    }

    if (date) body.appendChild(date);

    slide.appendChild(body);
  }

  function buildOutroSlides(base) {
    var slides = document.querySelectorAll('.reveal .slides section.outro');
    slides.forEach(function (slide) {
      slide.innerHTML = '';
      var img = document.createElement('img');
      img.src = base + 'assets/logos/logo-mu-wordmark.png';
      img.alt = 'Masaryk University';
      img.className = 'outro-logo';
      slide.appendChild(img);
    });
  }

  function createFooter() {
    var footer = document.createElement('div');
    footer.className = 'muni-footer';
    footer.id = 'muni-fss-footer';
    footer.innerHTML =
      '<span class="footer-author"></span>' +
      '<span class="footer-dot">&middot;</span>' +
      '<span class="footer-title"></span>' +
      '<span class="footer-dot">&middot;</span>' +
      '<span class="footer-date"></span>' +
      '<span class="footer-pages"></span>';
    document.querySelector('.reveal').appendChild(footer);
    return footer;
  }

  // Read optional <meta> overrides injected by a Lua filter or include-in-header
  function getMeta(name) {
    var el = document.querySelector('meta[name="' + name + '"]');
    return el ? el.content.trim() : null;
  }

  function populateFooter(footer) {
    var titleSlide = document.getElementById('title-slide');
    if (!titleSlide) return;

    // Prefer explicit short-* overrides from YAML metadata, fall back to DOM
    var authorEl = titleSlide.querySelector('.title-author');
    var titleEl  = titleSlide.querySelector('.title');
    var dateEl   = titleSlide.querySelector('.date');

    var author = getMeta('muni-footer-author') ||
                 (authorEl ? authorEl.textContent.trim() : '');
    var title  = getMeta('muni-footer-title') ||
                 (titleEl ? titleEl.textContent.trim() : '');
    var date   = dateEl ? dateEl.textContent.trim() : '';

    footer.querySelector('.footer-author').textContent = author;
    footer.querySelector('.footer-title').textContent  = title;
    footer.querySelector('.footer-date').textContent   = date;
  }

  function updateFooterVisibility(footer) {
    var current = Reveal.getCurrentSlide();
    var isTitle = current && current.id === 'title-slide';
    var isOutro = current && current.classList.contains('outro');
    footer.style.display = (isTitle || isOutro) ? 'none' : 'flex';
  }

  function updatePageNumbers(footer) {
    var indices = Reveal.getIndices();
    var total   = Reveal.getTotalSlides();
    // h is 0-based horizontal index; add 1 for display
    footer.querySelector('.footer-pages').textContent =
      (indices.h + 1) + ' / ' + total;
  }

  function init() {
    var base   = getExtBase();
    buildTitleSlide(base);
    buildOutroSlides(base);
    var footer = createFooter();
    populateFooter(footer);

    Reveal.on('ready', function () {
      updateFooterVisibility(footer);
      updatePageNumbers(footer);
    });

    Reveal.on('slidechanged', function () {
      updateFooterVisibility(footer);
      updatePageNumbers(footer);
    });
  }

  // Reveal.js is loaded before this script; wait for DOMContentLoaded
  // to ensure all slides are in the DOM, then hook into Reveal's ready event
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
}());
</script>
